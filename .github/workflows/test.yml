name: Test

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    name: Build and test
    runs-on: macos-15
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4

      - name: Select latest installed Xcode
        run: |
          latest=$(ls -d /Applications/Xcode_*.app 2>/dev/null \
            | sort -V \
            | tail -n 1)
          if [ -z "$latest" ]; then
            latest=/Applications/Xcode.app
          fi
          echo "Using $latest"
          sudo xcode-select -switch "$latest"
          xcodebuild -version

      - name: List available simulators
        run: xcrun simctl list devices available

      - name: Build and run tests
        run: |
          set -o pipefail
          xcodebuild test \
            -project FatigueTracker.xcodeproj \
            -scheme FatigueTracker \
            -destination 'platform=iOS Simulator,OS=latest,name=iPhone 16' \
            -resultBundlePath TestResults.xcresult \
            CODE_SIGNING_ALLOWED=NO

      - name: Upload test results on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: TestResults.xcresult
          path: TestResults.xcresult
